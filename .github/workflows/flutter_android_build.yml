name: Build Flutter Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Android release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android project if missing
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --project-name=pingenie --org=com.siam .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Patch native Android app-lock service
        run: python3 tool/patch_android_true_app_lock.py

      - name: Clean generated build cache
        run: flutter clean

      - name: Restore dependencies after clean
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build ARM64 release APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Build ARM32 release APK
        run: flutter build apk --release --target-platform android-arm --split-per-abi

      - name: Build universal release APK
        run: flutter build apk --release

      - name: Prepare APK artifacts
        run: |
          mkdir -p release-apks
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-apks/pin-genie-arm64-v8a-release.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-apks/pin-genie-armeabi-v7a-release.apk
          cp build/app/outputs/flutter-apk/app-release.apk release-apks/pin-genie-universal-release.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pin-genie-release-apks
          path: release-apks/*.apk
          if-no-files-found: error
